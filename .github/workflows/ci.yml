name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  lint-xml:
    name: Lint XML
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Lint block configs (incl. XInclude resolution)
        run: |
          set -e
          for f in config/blocks/*.xml; do
            xmllint --noout --xinclude "$f"
          done

      - name: Lint fragments
        run: |
          set -e
          for f in config/_fragments/*.xml; do
            xmllint --noout "$f"
          done

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse -c phpstan.neon --no-progress

  sync-fragments:
    name: _fragments in sync with helper
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check out sulu-block-helper (canonical fragments)
        uses: actions/checkout@v4
        with:
          repository: depa-berlin/sulu-block-helper
          ref: main
          path: .helper

      - name: Verify config/_fragments match the helper
        run: |
          rc=0
          for f in config/_fragments/*.xml; do
            name=$(basename "$f")
            canonical=".helper/config/_fragments/$name"
            if [ ! -f "$canonical" ]; then
              echo "::error file=$f::'$name' has no counterpart in sulu-block-helper/config/_fragments — not a shared fragment"
              rc=1
              continue
            fi
            if ! diff -u "$canonical" "$f"; then
              echo "::error file=$f::'$name' has drifted from sulu-block-helper's canonical copy — re-sync it"
              rc=1
            fi
          done
          if [ "$rc" -eq 0 ]; then echo "All config/_fragments/*.xml are in sync with sulu-block-helper."; fi
          exit $rc
